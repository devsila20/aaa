<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>𝚂𝙸𝙻𝙰 𝙼𝙸𝙽𝙸 Bot Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* Base */
  * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
  body { margin: 0; padding: 0; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }

  /* Login Overlay */
  #login-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(10,10,26,0.95);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
    backdrop-filter: blur(10px);
  }
  .login-card {
    background: #141428;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 0 20px #0066ff33, 0 0 40px #0044ff11;
    border: 1px solid rgba(0,100,255,0.3);
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .login-card h2 {
    color: #4488ff;
    font-size: 1.8rem;
    margin-bottom: 10px;
    text-shadow: 0 0 15px #4488ff88;
  }
  .login-card p {
    color: #8899bb;
    margin-bottom: 25px;
    font-size: 0.95rem;
  }
  .login-card input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 35px;
    border: 2px solid #3355aa55;
    background: #0a0a1a;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
    margin-bottom: 15px;
    transition: all 0.3s ease;
  }
  .login-card input:focus {
    border-color: #4488ff;
    box-shadow: 0 0 15px #4488ff33;
  }
  .login-card button {
    width: 100%;
    padding: 12px;
    border: 2px solid #4488ff;
    background: transparent;
    color: #4488ff;
    font-weight: 700;
    font-size: 1.1rem;
    border-radius: 35px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px #4488ff44;
  }
  .login-card button:hover {
    background: #4488ff;
    color: #0a0a0a;
    box-shadow: 0 0 25px #4488ff88, 0 0 50px #2266ff33;
  }
  .login-error {
    color: #ff4d4d;
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
  }

  /* Main Card */
  .card {
    background: #141428;
    padding: 2rem;
    border-radius: 20px;
    max-width: 450px;
    width: 100%;
    box-shadow: 0 0 20px #0066ff22;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover { transform: translateY(-5px); box-shadow: 0 0 50px #4488ffaa; }

  h2 {
    text-align: center;
    font-weight: 900;
    color: #4488ff;
    margin-bottom: 1.5rem;
    text-shadow: 0 0 10px #4488ff88;
  }

  label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #8899bb; }
  input, select { 
    width: 100%; 
    padding: 10px; 
    margin-bottom: 15px; 
    border: none; 
    border-radius: 10px; 
    background: #0a0a1a; 
    color: #fff; 
    border: 1px solid #1a1a3a;
  }
  input::placeholder { color: #556677; }
  select { cursor: pointer; }
  input:focus, select:focus {
    outline: none;
    border-color: #4488ff;
    box-shadow: 0 0 10px #4488ff33;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: transparent;
    border: 2px solid #4488ff;
    border-radius: 30px;
    color: #4488ff;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px #4488ff55;
  }
  button:hover { background: #4488ff; color: #0a0a0a; box-shadow: 0 0 30px #4488ff; }

  /* Emoji picker */
  .emoji-picker {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    background: #0a0a1a;
    padding: 8px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #1a1a3a;
  }
  .emoji-picker span {
    font-size: 22px;
    text-align: center;
    padding: 5px;
    border-radius: 6px;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .emoji-picker span:hover { background: #1a1a3a; }
  .emoji-picker span.selected { background: #4488ff; color: #0a0a0a; }

  .emoji-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .emoji-item { background: #4488ff33; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; color: #4488ff; }
  .emoji-item:hover { background: #4488ff; color: #0a0a0a; }

  /* Save message */
  #saveMsg { text-align: center; margin-top: 10px; font-weight: 600; color: #44ff88; }

  /* Logout button */
  .logout-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4488ff;
    color: #0a0a0a;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    z-index: 100;
    transition: all 0.3s ease;
    width: auto;
  }
  .logout-btn:hover {
    background: #66aaff;
    box-shadow: 0 0 15px #4488ff55;
  }

  /* Hidden class */
  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 500px) {
    .card { padding: 1.5rem; }
    .emoji-picker { grid-template-columns: repeat(5, 1fr); }
    .login-card { padding: 30px 20px; }
  }
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-card">
    <h2><i class="fas fa-lock"></i> 𝚂𝙸𝙻𝙰 𝙼𝙸𝙽𝙸</h2>
    <p>Settings Access Required</p>
    <input type="password" id="admin-password" placeholder="Enter password..." onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div class="login-error" id="login-error"><i class="fas fa-exclamation-circle"></i> Wrong password!</div>
  </div>
</div>

<!-- Main Content (Hidden until login) -->
<div id="main-content" class="hidden">
  <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

  <div class="card" id="settingsCard">
    <h2><i class="fas fa-cog"></i> Bot Settings</h2>

    <label>Prefix</label>
    <input id="prefix" type="text" placeholder=".">

    <label>Buttons</label>
    <select id="button">
      <option value="true">True</option>
      <option value="false">False</option>
    </select>

    <label>Auto View Status</label>
    <select id="autoView">
      <option value="true">True</option>
      <option value="false">False</option>
    </select>

    <label>Auto Like Status</label>
    <select id="autoLikeStatus">
      <option value="true">True</option>
      <option value="false">False</option>
    </select>

    <label>Auto Recording</label>
    <select id="autoRecording">
      <option value="true">True</option>
      <option value="false">False</option>
    </select>

    <label>Auto Like Emojis</label>
    <div class="emoji-picker" id="emojiPicker">😀 💚 😂 😍 😎 🤔 🥳 🔥 👍 🙏 ❤️ 😁 🖤 🥰 🍕 🎉 🌟 😭 🤯 🤍 🤖</div>
    <div class="emoji-list" id="emojiList"></div>
    <input id="newEmoji" type="text" placeholder="Add emoji">

    <button onclick="saveSettings()"><i class="fas fa-save"></i> Save Settings</button>
    <p id="saveMsg"></p>
  </div>
</div>

<script>
// Admin Password
const ADMIN_PASSWORD = "sila";

// Check if already logged in
window.onload = function() {
  if (localStorage.getItem('sila_settings_logged_in') === 'true') {
    showMainContent();
    loadSettings();
  }
};

function login() {
  const input = document.getElementById('admin-password').value;
  const errorEl = document.getElementById('login-error');
  
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem('sila_settings_logged_in', 'true');
    showMainContent();
    loadSettings();
  } else {
    errorEl.style.display = 'block';
    document.getElementById('admin-password').value = '';
    document.getElementById('admin-password').focus();
    
    // Shake animation
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    setTimeout(() => {
      card.style.animation = 'float 6s ease-in-out infinite';
    }, 10);
  }
}

function logout() {
  localStorage.removeItem('sila_settings_logged_in');
  location.reload();
}

function showMainContent() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
}

const params = new URLSearchParams(window.location.search);
const number = params.get('number');
if(!number) alert('Bot number missing in URL!');

let originalConfig = {};
let isEditing = false;
let selectedEmojis = [];

document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', () => isEditing = true));

const emojiPickerEl = document.getElementById('emojiPicker');
const emojiListEl = document.getElementById('emojiList');
const newEmojiEl = document.getElementById('newEmoji');

// Convert picker emojis to spans
emojiPickerEl.innerHTML = emojiPickerEl.textContent.trim().split(/\s+/).map(e => `<span>${e}</span>`).join('');

// Emoji picker click
emojiPickerEl.addEventListener('click', e => {
  if(e.target.tagName === 'SPAN'){
    const emoji = e.target.textContent;
    if(selectedEmojis.includes(emoji)){
      selectedEmojis = selectedEmojis.filter(em => em !== emoji);
      e.target.classList.remove('selected');
    } else {
      selectedEmojis.push(emoji);
      e.target.classList.add('selected');
    }
    renderEmojis();
    isEditing = true;
  }
});

function renderEmojis(){
  emojiListEl.innerHTML = '';
  selectedEmojis.forEach((emoji,i)=>{
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = emoji;
    span.onclick = () => {
      selectedEmojis.splice(i,1);
      renderEmojis();
      document.querySelectorAll('#emojiPicker span').forEach(span=>{
        if(span.textContent === emoji) span.classList.remove('selected');
      });
      isEditing = true;
    };
    emojiListEl.appendChild(span);
  });
}

function addEmoji(){
  const value = newEmojiEl.value.trim();
  if(value && !selectedEmojis.includes(value)){
    selectedEmojis.push(value);
    renderEmojis();
    document.querySelectorAll('#emojiPicker span').forEach(span=>{
      if(span.textContent === value) span.classList.add('selected');
    });
    newEmojiEl.value = '';
    isEditing = true;
  }
}

async function loadSettings() {
  if(!number) return;
  try{
    const res = await fetch(`/api/settings/${number}`);
    const data = await res.json();
    if(data && !isEditing){
      originalConfig = data;
      document.getElementById('prefix').value = data.PREFIX || '.';
      document.getElementById('button').value = data.BUTTON || 'true';
      document.getElementById('autoView').value = data.AUTO_VIEW_STATUS || 'true';
      document.getElementById('autoLikeStatus').value = data.AUTO_LIKE_STATUS || 'true';
      document.getElementById('autoRecording').value = data.AUTO_RECORDING || 'true';
      selectedEmojis = data.AUTO_LIKE_EMOJI || ['💗','🔥'];
      renderEmojis();
      document.querySelectorAll('#emojiPicker span').forEach(span=>{
        if(selectedEmojis.includes(span.textContent)) span.classList.add('selected');
      });
    }
  } catch(err){ console.error(err); }
}

async function saveSettings(){
  if(!number) return;
  const updatedConfig = {};
  if(document.getElementById('prefix').value !== originalConfig.PREFIX) updatedConfig.PREFIX = document.getElementById('prefix').value;
  if(document.getElementById('button').value !== originalConfig.BUTTON) updatedConfig.BUTTON = document.getElementById('button').value;
  if(document.getElementById('autoView').value !== originalConfig.AUTO_VIEW_STATUS) updatedConfig.AUTO_VIEW_STATUS = document.getElementById('autoView').value;
  if(document.getElementById('autoLikeStatus').value !== originalConfig.AUTO_LIKE_STATUS) updatedConfig.AUTO_LIKE_STATUS = document.getElementById('autoLikeStatus').value;
  if(document.getElementById('autoRecording').value !== originalConfig.AUTO_RECORDING) updatedConfig.AUTO_RECORDING = document.getElementById('autoRecording').value;
  if(JSON.stringify(selectedEmojis) !== JSON.stringify(originalConfig.AUTO_LIKE_EMOJI)) updatedConfig.AUTO_LIKE_EMOJI = selectedEmojis;

  if(Object.keys(updatedConfig).length===0){
    document.getElementById('saveMsg').innerText="No changes to save";
    setTimeout(()=>document.getElementById('saveMsg').innerText='',2000);
    return;
  }

  try{
    const res = await fetch(`/api/settings/${number}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(updatedConfig)
    });
    const data = await res.json();
    document.getElementById('saveMsg').innerText = data.message || 'Saved!';
    setTimeout(()=>document.getElementById('saveMsg').innerText='',2000);
    originalConfig = {...originalConfig,...updatedConfig};
    isEditing=false;
  } catch(err){ console.error(err); }
}

// Add emoji on Enter key
newEmojiEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') addEmoji();
});
</script>
</body>
</html>
